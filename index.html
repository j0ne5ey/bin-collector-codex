<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#2a669f">
    <meta name="description" content="See your next two Scottish Borders bin collections at a glance.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bin Collection">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="stylesheet" href="styles.css">
    <title>Bin Collection</title>
  </head>
  <body>
    <div class="backdrop" aria-hidden="true">
      <svg viewBox="0 0 56 56" fill="none">
        <path d="M28 6 A22 22 0 1 1 11 17" />
        <path d="M11 8 L11 17 L20 17" />
      </svg>
    </div>

    <div id="pull-indicator" class="pull-indicator" aria-hidden="true">
      <span id="pull-icon">↓</span>
      <span id="pull-label">Pull to refresh</span>
    </div>

    <main class="app-shell">
      <header class="brand" aria-label="Bin Collection">
        <svg class="brand-mark" viewBox="0 0 56 56" role="img" aria-label="Recurring collection cycle">
          <path d="M28 6 A22 22 0 1 1 11 17" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
          <path d="M11 8 L11 17 L20 17" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h1>Bin Collection</h1>
      </header>

      <section id="status" class="status" aria-live="polite">
        <span class="status-dot"></span>
        <span id="status-text">Checking schedule…</span>
      </section>

      <section id="collections" class="collections" aria-busy="true">
        <article class="collection-card imminent skeleton" aria-hidden="true"></article>
        <article class="collection-card then skeleton" aria-hidden="true"></article>
      </section>

      <section id="setup" class="setup-panel" hidden>
        <span class="setup-icon" aria-hidden="true">⌁</span>
        <h2>Connect your address</h2>
        <p>Add the repository secrets <code>SBC_POSTCODE</code> and <code>SBC_UPRN</code>, then run the “Update collections” workflow.</p>
      </section>

      <footer>
        <button id="refresh-button" class="refresh-button" type="button">
          <span class="refresh-symbol" aria-hidden="true">↻</span>
          <span>Refresh collections</span>
        </button>
        <p id="updated-at" class="updated-at"></p>
        <p class="disclaimer">Independent helper using collection information published by Scottish Borders Council.</p>
      </footer>
    </main>

    <template id="collection-template">
      <article class="collection-card">
        <div class="card-heading">
          <div>
            <p class="card-kicker"></p>
            <h2 class="relative-date"></h2>
          </div>
          <p class="calendar-date"></p>
        </div>
        <div class="bin-list"></div>
      </article>
    </template>

    <script type="module" src="app.js"></script>
  </body>
</html>
