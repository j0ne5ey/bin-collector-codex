name: Update collections

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-collections
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Fetch SBC schedule
        run: npm run fetch
        env:
          SBC_POSTCODE: ${{ secrets.SBC_POSTCODE }}
          SBC_UPRN: ${{ secrets.SBC_UPRN }}
      - name: Commit changed schedule
        run: |
          if git diff --quiet -- data/collections.json; then
            echo "Schedule is unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/collections.json
          git commit -m "chore: update bin collection schedule"
          git push
